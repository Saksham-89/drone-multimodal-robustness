name: thesis
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch>=2.0
  - torchvision
  - pytorch-cuda=11.8
  - numpy
  - scipy                         # required by pipeline.py (gaussian_filter for TIR blur)
  - scikit-image                  # required by imagecorruptions (brightness/contrast use skimage)
  - pillow
  - pyyaml
  - tqdm
  - matplotlib
  - pandas
  - jupyter
  - setuptools                    # provides pkg_resources; needed by several build systems
  - pytest                        # test runner
  - pip
  - pip:
    - setuptools                  # ensures pkg_resources is available to pip-installed packages
    - imagecorruptions            # corruption transforms (Michaelis et al.)
    - wand                        # required by imagecorruptions.motion_blur (ImageMagick binding)
    # mmcv / mmdet are NOT installed here — they must be installed separately per model
    # using pre-built wheels matched to the exact CUDA+PyTorch version:
    #   pip install mmcv -f https://download.openmmlab.com/mmcv/dist/cu118/torch2.0/index.html
    # See models/*/README for per-model environment setup instructions.
